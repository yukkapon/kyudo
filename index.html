<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>弓道ゲーム</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f6efe3;
text-align:center;
}

#ui{
background:#3b2f2f;
color:white;
padding:10px;
font-size:18px;
}

canvas{
background:linear-gradient(#dfefff,#b8d4a8);
display:block;
margin:auto;
touch-action:none;
}

#info{
padding:8px;
background:#fff8dc;
font-size:14px;
}

</style>
</head>

<body>

<div id="ui">
🏹 弓道ゲーム  
<span id="score">Score:0</span>
</div>

<canvas id="game" width="400" height="600"></canvas>

<div id="info">
画面を押してパワーをためる / 左右に動かして角度調整
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let score = 0

let charging=false
let power=0
let angle=-45

let startX=0

let arrow={
x:80,
y:500,
vx:0,
vy:0,
shot:false
}

let target={
x:340,
y:200,
r:45
}

function drawDojo(){

ctx.fillStyle="#8b5a2b"
ctx.fillRect(0,520,400,80)

ctx.fillStyle="#6b4423"
ctx.fillRect(0,510,400,10)

}

function drawTarget(){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(target.x,target.y,target.r,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(target.x,target.y,target.r*0.65,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(target.x,target.y,target.r*0.3,0,Math.PI*2)
ctx.fill()

}

function drawBow(){

ctx.save()

ctx.translate(80,500)
ctx.rotate(angle*Math.PI/180)

ctx.strokeStyle="#4b2e1e"
ctx.lineWidth=6
ctx.beginPath()
ctx.arc(0,0,50,Math.PI/2,Math.PI*1.5)
ctx.stroke()

ctx.restore()

}

function drawArrow(){

ctx.save()

ctx.translate(arrow.x,arrow.y)

if(arrow.shot){
ctx.rotate(Math.atan2(arrow.vy,arrow.vx))
}else{
ctx.rotate(angle*Math.PI/180)
}

ctx.strokeStyle="black"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(-30,0)
ctx.stroke()

ctx.restore()

}

function update(){

if(charging){
power+=0.2
if(power>18) power=18
}

if(arrow.shot){

arrow.x+=arrow.vx
arrow.y+=arrow.vy

arrow.vy+=0.15

}

let dx=arrow.x-target.x
let dy=arrow.y-target.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<target.r && arrow.shot){

let add=Math.floor((target.r-dist)*3)

score+=add

document.getElementById("score").innerText="Score:"+score

resetArrow()

}

if(arrow.x>canvas.width||arrow.y>canvas.height||arrow.y<0){
resetArrow()
}

}

function resetArrow(){

arrow.x=80
arrow.y=500
arrow.vx=0
arrow.vy=0
arrow.shot=false
power=0

}

function drawUI(){

ctx.fillStyle="black"
ctx.fillText("Power:"+power.toFixed(1),10,20)
ctx.fillText("Angle:"+Math.round(angle),10,40)

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawDojo()
drawTarget()
drawBow()
drawArrow()
drawUI()

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

canvas.addEventListener("pointerdown",(e)=>{

if(!arrow.shot){

charging=true
startX=e.clientX

}

})

canvas.addEventListener("pointermove",(e)=>{

if(charging){

let dx=e.clientX-startX

angle=-45 + dx*0.2

if(angle<-80) angle=-80
if(angle>-10) angle=-10

}

})

canvas.addEventListener("pointerup",()=>{

if(charging){

charging=false

arrow.shot=true

let rad=angle*Math.PI/180

arrow.vx=Math.cos(rad)*power
arrow.vy=Math.sin(rad)*power

}

})

loop()

</script>

</body>
</html>
