<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>弓道マスター Ultimate</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#efe7d6;
overflow:hidden;
text-align:center;
}

canvas{
display:block;
margin:auto;
touch-action:none;
}

#ui{
position:absolute;
top:0;
width:100%;
background:#2c1b12;
color:white;
padding:8px;
display:flex;
justify-content:space-around;
}

#title{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:10px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
}

#message{
position:absolute;
top:90px;
width:100%;
font-size:30px;
color:white;
text-shadow:2px 2px 5px black;
pointer-events:none;
}

</style>
</head>

<body>

<div id="ui">
<div id="score">Score:0</div>
<div id="stage">Stage:1</div>
<div id="mode">Normal</div>
</div>

<div id="title">
<h1>弓道マスター</h1>
<button onclick="startGame()">スタート</button>
<button onclick="showRanking()">ランキング</button>
</div>

<div id="message"></div>

<canvas id="game" width="400" height="650"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let game=false
let score=0
let stage=1

let charging=false
let power=0
let angle=-45
let startX=0

let slowMode=false

let arrowType=0
const arrowNames=["Normal","Fast","Heavy"]

let sakura=[]

let arrow={
x:80,
y:560,
vx:0,
vy:0,
shot:false
}

let target={
x:340,
y:200,
r:40,
vx:2
}

function startGame(){

document.getElementById("title").style.display="none"

score=0
stage=1
game=true

}

function playSound(freq){

let ctxAudio=new AudioContext()
let osc=ctxAudio.createOscillator()

osc.frequency.value=freq
osc.connect(ctxAudio.destination)

osc.start()

setTimeout(()=>osc.stop(),100)

}

function spawnSakura(){

if(Math.random()<0.3){

sakura.push({
x:Math.random()*400,
y:-10,
vy:1+Math.random()*2
})

}

}

function drawSakura(){

ctx.fillStyle="pink"

sakura.forEach(p=>{

p.y+=p.vy

ctx.beginPath()
ctx.arc(p.x,p.y,3,0,Math.PI*2)
ctx.fill()

})

sakura=sakura.filter(p=>p.y<650)

}

function drawTarget(){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(target.x,target.y,target.r,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(target.x,target.y,target.r*0.6,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(target.x,target.y,target.r*0.3,0,Math.PI*2)
ctx.fill()

}

function drawArrow(){

ctx.save()

ctx.translate(arrow.x,arrow.y)

if(arrow.shot){
ctx.rotate(Math.atan2(arrow.vy,arrow.vx))
}else{
ctx.rotate(angle*Math.PI/180)
}

ctx.strokeStyle="black"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(-35,0)
ctx.stroke()

ctx.restore()

}

function update(){

if(!game) return

spawnSakura()

let speed=slowMode?0.5:1

if(charging){

power+=0.25
if(power>20) power=20

}

if(arrow.shot){

arrow.x+=arrow.vx*speed
arrow.y+=arrow.vy*speed

arrow.vy+=0.15*speed

}

target.x+=target.vx*speed

if(target.x>380||target.x<300){
target.vx*=-1
}

let dx=arrow.x-target.x
let dy=arrow.y-target.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<target.r && arrow.shot){

score+=100

playSound(500)

showMessage("HIT!")

stage++

document.getElementById("stage").innerText="Stage:"+stage
document.getElementById("score").innerText="Score:"+score

if(stage%5==0){

target.r=60
target.vx=4
showMessage("BOSS TARGET!")

}

resetArrow()

}

if(
arrow.x>400||
arrow.y>650||
arrow.y<0
){
resetArrow()
}

}

function resetArrow(){

arrow.x=80
arrow.y=560
arrow.vx=0
arrow.vy=0
arrow.shot=false
power=0

}

function drawBackground(){

if(stage%2==0){

ctx.fillStyle="#0a1c3a"
ctx.fillRect(0,0,400,650)

}else{

ctx.fillStyle="#cfe8ff"
ctx.fillRect(0,0,400,650)

}

}

function draw(){

drawBackground()

drawTarget()
drawArrow()
drawSakura()

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

function showMessage(text){

let m=document.getElementById("message")

m.innerText=text

setTimeout(()=>m.innerText="",1000)

}

function saveScore(){

let ranking=JSON.parse(localStorage.getItem("kyudoRank")||"[]")

ranking.push(score)

ranking.sort((a,b)=>b-a)

ranking=ranking.slice(0,5)

localStorage.setItem("kyudoRank",JSON.stringify(ranking))

}

function showRanking(){

let ranking=JSON.parse(localStorage.getItem("kyudoRank")||"[]")

alert("ランキング\n"+ranking.join("\n"))

}

canvas.addEventListener("pointerdown",(e)=>{

if(!arrow.shot){

charging=true
startX=e.clientX

}

})

canvas.addEventListener("pointermove",(e)=>{

if(charging){

let dx=e.clientX-startX

angle=-45+dx*0.25

}

})

canvas.addEventListener("pointerup",()=>{

if(charging){

charging=false

arrow.shot=true

playSound(200)

let rad=angle*Math.PI/180

let speed=power

if(arrowType==1) speed*=1.3
if(arrowType==2) speed*=0.8

arrow.vx=Math.cos(rad)*speed
arrow.vy=Math.sin(rad)*speed

}

})

document.addEventListener("keydown",(e)=>{

if(e.key=="1") arrowType=0
if(e.key=="2") arrowType=1
if(e.key=="3") arrowType=2

if(e.key=="s") slowMode=!slowMode

document.getElementById("mode").innerText=
slowMode?"Focus":"Normal"

})

loop()

</script>

</body>
</html>
