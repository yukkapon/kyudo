<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>弓道マスター Ultimate+</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#efe7d6;
overflow:hidden;
text-align:center;
}

canvas{
display:block;
margin:auto;
touch-action:none;
}

#ui{
position:absolute;
top:0;
width:100%;
background:#2c1b12;
color:white;
padding:8px;
display:flex;
justify-content:space-around;
font-size:14px;
}

#message{
position:absolute;
top:90px;
width:100%;
font-size:28px;
color:white;
text-shadow:2px 2px 5px black;
pointer-events:none;
}

</style>
</head>

<body>

<div id="ui">
<div id="score">Score:0</div>
<div id="stage">Stage:1</div>
<div id="angle">Angle:-45</div>
<div id="power">Power:0</div>
</div>

<div id="message"></div>

<canvas id="game" width="400" height="650"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let score=0
let stage=1

let charging=false
let power=0
let angle=-45
let startX=0

let wind=0

let arrow={
x:80,
y:560,
vx:0,
vy:0,
shot:false
}

let target={
x:340,
y:200,
r:40,
vx:2
}

function newWind(){
wind=(Math.random()*0.4-0.2)*stage
}

newWind()

function drawBow(){

ctx.save()

ctx.translate(80,560)
ctx.rotate(angle*Math.PI/180)

ctx.strokeStyle="#4b2e1e"
ctx.lineWidth=6

ctx.beginPath()
ctx.arc(0,0,60,Math.PI/2,Math.PI*1.5)
ctx.stroke()

ctx.restore()

}

function drawArrow(){

ctx.save()

ctx.translate(arrow.x,arrow.y)

if(arrow.shot){
ctx.rotate(Math.atan2(arrow.vy,arrow.vx))
}else{
ctx.rotate(angle*Math.PI/180)
}

ctx.strokeStyle="black"
ctx.lineWidth=3

ctx.beginPath()
ctx.moveTo(0,0)
ctx.lineTo(-40,0)
ctx.stroke()

ctx.restore()

}

function drawTarget(){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(target.x,target.y,target.r,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(target.x,target.y,target.r*0.7,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(target.x,target.y,target.r*0.4,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(target.x,target.y,target.r*0.2,0,Math.PI*2)
ctx.fill()

}

function drawGuide(){

if(!charging) return

ctx.fillStyle="rgba(0,0,0,0.3)"

let simX=arrow.x
let simY=arrow.y

let rad=angle*Math.PI/180

let vx=Math.cos(rad)*power
let vy=Math.sin(rad)*power

for(let i=0;i<40;i++){

simX+=vx
simY+=vy

vy+=0.15
vx+=wind*0.01

ctx.beginPath()
ctx.arc(simX,simY,2,0,Math.PI*2)
ctx.fill()

}

}

function update(){

if(charging){

power+=0.25
if(power>20) power=20

}

if(arrow.shot){

arrow.x+=arrow.vx
arrow.y+=arrow.vy

arrow.vy+=0.15
arrow.vx+=wind*0.01

}

target.x+=target.vx

if(target.x>380||target.x<300){
target.vx*=-1
}

let dx=arrow.x-target.x
let dy=arrow.y-target.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<target.r && arrow.shot){

score+=100

showMessage("HIT!")

stage++

document.getElementById("stage").innerText="Stage:"+stage
document.getElementById("score").innerText="Score:"+score

newWind()

resetArrow()

}

if(
arrow.x>400||
arrow.y>650||
arrow.y<0
){
resetArrow()
}

}

function resetArrow(){

arrow.x=80
arrow.y=560
arrow.vx=0
arrow.vy=0
arrow.shot=false
power=0

}

function drawBackground(){

ctx.fillStyle="#cfe8ff"
ctx.fillRect(0,0,400,650)

ctx.fillStyle="#8b5a2b"
ctx.fillRect(0,580,400,70)

}

function draw(){

drawBackground()

drawTarget()
drawBow()
drawArrow()
drawGuide()

ctx.fillStyle="black"
ctx.fillText("Wind:"+wind.toFixed(2),10,50)

}

function loop(){

update()
draw()

document.getElementById("angle").innerText="Angle:"+Math.round(angle)
document.getElementById("power").innerText="Power:"+power.toFixed(1)

requestAnimationFrame(loop)

}

function showMessage(text){

let m=document.getElementById("message")

m.innerText=text

setTimeout(()=>m.innerText="",1000)

}

canvas.addEventListener("pointerdown",(e)=>{

if(!arrow.shot){

charging=true
startX=e.clientX

}

})

canvas.addEventListener("pointermove",(e)=>{

if(charging){

let dx=e.clientX-startX

angle=-45+dx*0.25

if(angle<-80) angle=-80
if(angle>-5) angle=-5

}

})

canvas.addEventListener("pointerup",()=>{

if(charging){

charging=false

arrow.shot=true

let rad=angle*Math.PI/180

arrow.vx=Math.cos(rad)*power
arrow.vy=Math.sin(rad)*power

}

})

loop()

</script>

</body>
</html>
